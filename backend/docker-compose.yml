services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: knowledge_desk
      POSTGRES_USER: knowledge
      POSTGRES_PASSWORD: knowledge_local
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U knowledge -d knowledge_desk"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - knowledge_postgres:/var/lib/postgresql/data
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@knowledgedesk.dev
      PGADMIN_DEFAULT_PASSWORD: knowledge_admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - knowledge_pgadmin:/var/lib/pgadmin
      - ./docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
    restart: unless-stopped
volumes:
  knowledge_postgres:
  knowledge_pgadmin:
